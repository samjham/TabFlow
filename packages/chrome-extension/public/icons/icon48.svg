<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#181b28"/>
      <stop offset="100%" stop-color="#0d0f16"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6c8cff"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6c8cff"/>
      <stop offset="50%" stop-color="#8b6cff"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="cardGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feFlood flood-color="#6c8cff" flood-opacity="0.15"/>
      <feComposite in2="blur" operator="in" result="glowColor"/>
      <feMerge>
        <feMergeNode in="glowColor"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="128" height="128" rx="28" ry="28" fill="url(#bg)"/>
  <rect x="0.75" y="0.75" width="126.5" height="126.5" rx="27.25" ry="27.25" fill="none" stroke="#252838" stroke-width="1.5"/>

  <!-- Back card (rotated left) -->
  <g transform="translate(64,58) rotate(-12) translate(-64,-58)">
    <rect x="26" y="28" width="76" height="52" rx="7" ry="7" fill="#171a26" stroke="#2a2d3a" stroke-width="1"/>
    <rect x="26" y="28" width="76" height="5" rx="7" ry="7" fill="#ef4444" opacity="0.6"/>
    <rect x="26" y="30" width="76" height="3" fill="#ef4444" opacity="0.6"/>
  </g>

  <!-- Middle card (rotated right slightly) -->
  <g transform="translate(64,58) rotate(5) translate(-64,-58)">
    <rect x="26" y="28" width="76" height="52" rx="7" ry="7" fill="#1c1f2e" stroke="#2e3142" stroke-width="1"/>
    <rect x="26" y="28" width="76" height="5" rx="7" ry="7" fill="#22c55e" opacity="0.6"/>
    <rect x="26" y="30" width="76" height="3" fill="#22c55e" opacity="0.6"/>
  </g>

  <!-- Front/active card (centered, glowing) -->
  <g filter="url(#cardGlow)">
    <rect x="26" y="28" width="76" height="52" rx="7" ry="7" fill="#1f2236" stroke="url(#accent)" stroke-width="1.5"/>
    <!-- Top accent bar -->
    <rect x="26" y="28" width="76" height="6" rx="7" ry="7" fill="url(#accent)"/>
    <rect x="26" y="30" width="76" height="4" fill="url(#accent)"/>
  </g>

  <!-- Content lines on front card -->
  <rect x="34" y="42" width="28" height="3" rx="1.5" fill="#6c8cff" opacity="0.7"/>
  <rect x="34" y="49" width="50" height="2.5" rx="1.25" fill="#4a4e5e" opacity="0.5"/>
  <rect x="34" y="55" width="42" height="2.5" rx="1.25" fill="#4a4e5e" opacity="0.35"/>
  <rect x="34" y="61" width="46" height="2.5" rx="1.25" fill="#4a4e5e" opacity="0.25"/>

  <!-- Workspace color dot on front card -->
  <circle cx="92" cy="42" r="4" fill="url(#accent)"/>

  <!-- Flow wave + arrow (larger, more prominent) -->
  <g>
    <path d="M 30 96 Q 48 84 64 96 Q 80 108 98 96" fill="none" stroke="url(#accent2)" stroke-width="3" stroke-linecap="round" opacity="0.9"/>
    <path d="M 93 93 L 100 96 L 93 99" fill="none" stroke="url(#accent2)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
  </g>
</svg>
