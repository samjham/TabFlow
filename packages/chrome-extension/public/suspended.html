<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loading...</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0f1117;
      color: #e8eaed;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      user-select: none;
    }
    .container {
      text-align: center;
      max-width: 500px;
      padding: 40px;
    }
    .favicon {
      width: 48px;
      height: 48px;
      margin-bottom: 20px;
      border-radius: 8px;
    }
    .title {
      font-size: 18px;
      font-weight: 600;
      color: #fff;
      margin-bottom: 12px;
      word-break: break-word;
    }
    .url {
      font-size: 13px;
      color: #6c8cff;
      margin-bottom: 24px;
      word-break: break-all;
    }
    .hint {
      font-size: 13px;
      color: #8b8fa3;
    }
    .click-area {
      cursor: pointer;
      padding: 20px;
      border-radius: 12px;
      transition: background 0.2s;
    }
    .click-area:hover {
      background: #1a1d27;
    }
    .tabflow-badge {
      position: fixed;
      bottom: 16px;
      right: 16px;
      font-size: 11px;
      color: #3d4150;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="click-area" id="clickArea">
      <img class="favicon" id="favicon" src="" alt="" style="display:none;">
      <div class="title" id="title"></div>
      <div class="url" id="url"></div>
      <div class="hint">Click anywhere to load this page</div>
    </div>
  </div>
  <div class="tabflow-badge">TabFlow - Suspended</div>
  <script src="suspended.js"></script>
</body>
</html>
